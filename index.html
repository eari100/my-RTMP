<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Go 내장 라이브 방송국</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
</head>
<body>
<h1>📹 재욱 테스트</h1>
<video id="videoElement" controls autoplay muted></video>
<script>
    // 1. mpegts 라이브러리가 브라우저에 잘 로드되었는지 확인
    if (typeof mpegts !== 'undefined') {
        var videoElement = document.getElementById('videoElement');

        // 2. 곧바로 플레이어 생성 (최신 브라우저는 내부적으로 자동 지원 여부를 판단합니다)
        var player = mpegts.createPlayer({
            type: 'flv',
            isLive: true,
            url: '/live/tmp-wook'
        });

        player.attachMediaElement(videoElement);
        player.load();

        // 브라우저 정책상 자동 재생을 위해 무음(muted) 상태에서 play()를 호출합니다.
        player.play().catch(function(error) {
            console.log("자동 재생 차단됨 (사용자 상호작용 필요):", error);
        });

    } else {
        alert("mpegts.js 라이브러리를 로드할 수 없습니다. 인터넷 연결을 확인해주세요.");
    }
</script>
</body>
</html>
