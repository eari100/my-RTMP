<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재욱TV - 라이브 방송 리스트</title>
    <style>
        /* 🎨 글로벌 변수 및 초기화 */
        :root {
            --bg-main: #0f0f12;       /* 깊은 다크 배경 */
            --bg-card: #18181c;       /* 카드 및 헤더 배경 */
            --text-main: #ffffff;     /* 메인 흰색 글씨 */
            --text-sub: #9ca3af;      /* 연한 회색 글씨 */
            --point-color: #00ffcc;   /* 시그니처 민트 포인트 */
            --live-color: #ff4a4a;    /* 라이브 빨간색 */
            --border-color: #26262b;  /* 경계선 색상 */
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ==========================================================================
           📌 1. 공통 헤더 (Header) 디자인
           ========================================================================== */
        .main-header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 100;
        }

        /* 로고 영역 */
        .logo-area {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo-area span {
            color: var(--point-color);
        }

        /* 헤더 우측 버튼 그룹 */
        .header-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 기본 공통 버튼 스타일 */
        .nav-btn {
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        /* 방송하기 버튼 (민트 포인트 강조) */
        .btn-stream {
            background-color: transparent;
            color: var(--point-color);
            border-color: var(--point-color);
        }

        .btn-stream:hover {
            background-color: var(--point-color);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        /* 로그인 버튼 */
        .btn-login {
            background-color: #2a2a30;
            color: var(--text-main);
            border: none;
        }

        .btn-login:hover {
            background-color: #3b3b44;
        }

        /* ==========================================================================
           📌 2. 메인 컨텐츠 영역 및 그리드 라이브 리스트
           ========================================================================== */
        .content-wrapper {
            max-width: 1400px;
            margin: 110px auto 50px auto; /* 헤더에 가려지지 않게 상단 여백 보정 */
            padding: 0 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 💡 반응형 네모 칸 썸네일 그리드 레이아웃 */
        .stream-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        /* 방송 카드 컴포넌트 */
        .stream-card {
            background-color: transparent;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease;
        }

        .stream-card:hover {
            transform: translateY(-5px);
        }

        /* 썸네일 박스 (상대 좌표 기준) */
        .thumbnail-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* 16:9 규격 고정 */
            background-color: #232329;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .thumbnail-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 배지: 🔴 LIVE */
        .badge-live {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--live-color);
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        /* 배지: 시청자 수 */
        .badge-viewers {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
        }

        /* 방송 정보 영역 (하단 글씨 배치) */
        .stream-info {
            display: flex;
            margin-top: 12px;
            padding: 0 4px;
            gap: 12px;
        }

        /* 스트리머 프로필 아바타 동그라미 */
        .streamer-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #3b3b44;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .streamer-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 텍스트 디테일 */
        .stream-detail {
            flex-grow: 1;
            overflow: hidden;
        }

        .stream-title {
            font-size: 15px;
            font-weight: bold;
            margin: 0 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 글자가 넘치면 ... 처리 */
            color: var(--text-main);
        }

        .stream-author {
            font-size: 13px;
            color: var(--text-sub);
            margin: 0 0 4px 0;
        }

        .stream-category {
            display: inline-block;
            font-size: 11px;
            background-color: #202026;
            color: var(--point-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<header class="main-header">
    <a href="#" class="logo-area">
        재욱<span>TV</span>
    </a>
    <div class="header-buttons">
        <a href="#" class="nav-btn btn-stream">📹 방송하기</a>
        <button class="nav-btn btn-login">로그인</button>
        <a href="/auth/google/login" class="nav-btn btn-login" style="text-decoration: none; text-align: center;">구글 로그인</a>
    </div>
</header>

<main class="content-wrapper">
    <h2 class="section-title">추천 라이브 방송</h2>

    <div class="stream-grid">

        <a href="/live-player.html" class="stream-card">
            <div class="thumbnail-box">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600" alt="썸네일">
                <span class="badge-live">LIVE</span>
                <span class="badge-viewers">1,245명 시청 중</span>
            </div>
            <div class="stream-info">
                <div class="streamer-avatar">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=100" alt="아바타">
                </div>
                <div class="stream-detail">
                    <p class="stream-title">Go 내장 미디어 서버 인코딩 최종 테스트 방송!</p>
                    <p class="stream-author">재욱개발자</p>
                    <span class="stream-category">코딩 & 개발</span>
                </div>
            </div>
        </a>

        <a href="#" class="stream-card">
            <div class="thumbnail-box">
                <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=600" alt="썸네일">
                <span class="badge-live">LIVE</span>
                <span class="badge-viewers">843명 시청 중</span>
            </div>
            <div class="stream-info">
                <div class="streamer-avatar">
                    <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?q=80&w=100" alt="아바타">
                </div>
                <div class="stream-detail">
                    <p class="stream-title">🎮 2026 레전드 명작 오픈월드 RPG 같이 깨요</p>
                    <p class="stream-author">겜마스터</p>
                    <span class="stream-category">게임</span>
                </div>
            </div>
        </a>

        <a href="#" class="stream-card">
            <div class="thumbnail-box">
                <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd6a?q=80&w=600" alt="썸네일">
                <span class="badge-live">LIVE</span>
                <span class="badge-viewers">320명 시청 중</span>
            </div>
            <div class="stream-info">
                <div class="streamer-avatar">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=100" alt="아바타">
                </div>
                <div class="stream-detail">
                    <p class="stream-title">🎸 퇴근길 고막 힐링 잔잔한 어쿠스틱 라디오 방송</p>
                    <p class="stream-author">뮤직하우스</p>
                    <span class="stream-category">음악</span>
                </div>
            </div>
        </a>

        <a href="#" class="stream-card">
            <div class="thumbnail-box">
                <img src="https://images.unsplash.com/photo-1552674605-db6ffd4facb5?q=80&w=600" alt="썸네일">
                <span class="badge-live">LIVE</span>
                <span class="badge-viewers">2,104명 시청 중</span>
            </div>
            <div class="stream-info">
                <div class="streamer-avatar">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=100" alt="아바타">
                </div>
                <div class="stream-detail">
                    <p class="stream-title">⚽️ [해외 축구 민심 분석] 오늘 밤 빅매치 프리뷰 토크</p>
                    <p class="stream-author">방구석축구왕</p>
                    <span class="stream-category">스포츠</span>
                </div>
            </div>
        </a>

    </div>
</main>

</body>
</html>
