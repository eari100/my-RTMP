<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🔮 스트리머 스튜디오</title>
    {{ template "global_css" . }}
    <style>
        .studio-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.05);
        }

        .modal-title {
            font-size: 20px; font-weight: bold; margin-top: 0; margin-bottom: 25px;
            color: var(--point-color); text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 8px; font-weight: 600; }

        .studio-input {
            width: 100%; background-color: var(--bg-main); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 12px; border-radius: 6px; font-size: 14px;
            box-sizing: border-box; transition: all 0.2s;
        }
        .studio-input:focus { outline: none; border-color: var(--point-color); box-shadow: 0 0 10px rgba(168, 85, 247, 0.2); }

        .copy-input-group { display: flex; gap: 8px; }
        .btn-copy {
            background-color: #1e1e24; color: var(--text-main); border: 1px solid #2e2e38;
            padding: 0 15px; border-radius: 6px; font-weight: bold; cursor: pointer;
            white-space: nowrap; font-size: 13px; transition: all 0.2s;
        }
        .btn-copy:hover { background-color: #2b2b35; border-color: var(--point-color); }

        .btn-save-stream {
            width: 100%; background-color: var(--point-color); color: #ffffff; border: none;
            padding: 14px; font-size: 15px; font-weight: bold; border-radius: 6px;
            cursor: pointer; margin-top: 10px; transition: all 0.2s;
        }

        .btn-save-stream:hover { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }

        /* 🎯 라이브 배지 깜빡임(Pulse) 애니메이션 효과 추가 */
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

<div class="studio-container">
    <h3 class="modal-title">🔮 스트리머 스튜디오
        <span id="liveBadge" style="display: none; align-items: center; gap: 6px; background-color: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; text-shadow: none;">
            <span style="width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite;"></span>
            LIVE 송출 중
        </span>
    </h3>

    <form id="streamConfigForm">
        <div class="form-group">
            <label for="streamTitle">방송 제목</label>
            <input type="text" id="streamTitle" class="studio-input" placeholder="시청자들의 마음을 사로잡을 제목을 입력하세요">
        </div>

        <div class="form-group">
            <label>RTMP 송출 주소 (URL)</label>
            <div class="copy-input-group">
                <input type="text" id="rtmpUrl" class="studio-input" value="rtmp://localhost/live" readonly>
                <button type="button" class="btn-copy" onclick="copyToClipboard('rtmpUrl')">복사</button>
            </div>
        </div>

        <div class="form-group">
            <label>스트림 키 (Stream Key)</label>
            <div class="copy-input-group">
                <input type="password" id="streamKey" class="studio-input" value="••••••••••••••••" readonly>
                <button type="button" class="btn-copy" id="toggleKeyBtn" style="background-color: #0a0a0d;">보기</button>
                <button type="button" class="btn-copy" onclick="copyToClipboard('streamKey')">복사</button>
            </div>
            <button type="button" id="btnResetKey" class="btn-copy" style="width: 100%; border-color: #ef4444; color: #ef4444; justify-content: center;">
                🔄 스트림 키 재발급 (유출 시 필수)
            </button>
        </div>

        <button type="submit" class="btn-save-stream">적용하기</button>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toggleKeyBtn = document.getElementById('toggleKeyBtn');
        const streamKeyInput = document.getElementById('streamKey');
        const configForm = document.getElementById('streamConfigForm');
        const btnResetKey = document.getElementById('btnResetKey');
        const liveBadge = document.getElementById('liveBadge');

        fetch('/api/rooms/my', {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
        })
        .then(response => {
            if (!response.ok) throw new Error('서버 응답 오류');
            return response.json();
        })
        .then(data => {
            if (data.title) document.getElementById('streamTitle').value = data.title;
            if (data.stream_key) document.getElementById('streamKey').value = data.stream_key;
        })
        .catch(error => {
            console.error('AJAX 로드 실패:', error);
        });

        configForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const updatedTitle = document.getElementById('streamTitle').value;

            if (!updatedTitle.trim()) {
                alert('방송 제목을 입력해 주세요.');
                return;
            }

            fetch('/api/rooms/my', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ title: updatedTitle })
            })
            .then(response => {
                if (!response.ok) {
                    // 400, 401, 500 등 에러 발생 시 처리
                    return response.json().then(err => { throw new Error(err.error || '서버 오류'); });
                }
                return response.json();
            })
            .then(data => {
                alert('✨ 성공적으로 변경되었습니다!');
            })
            .catch(error => {
                console.error('제목 수정 실패:', error);
                alert(`🚨 에러 발생: ${error.message}`);
            });
        });

        toggleKeyBtn.addEventListener('click', () => {
            if (streamKeyInput.type === "password") {
                streamKeyInput.type = "text";
                toggleKeyBtn.textContent = "숨기기";
            } else {
                streamKeyInput.type = "password";
                toggleKeyBtn.textContent = "보기";
            }
        });

        btnResetKey.addEventListener('click', function() {
            if (!confirm("🚨 정말로 스트림 키를 재발급하시겠습니까?\n재발급 시 기존 키를 사용 중인 OBS 방송 송출이 즉시 차단됩니다.")) {
                return;
            }

            fetch('/api/rooms/my/reset-key', {
                method: 'POST',
                headers: { 'Accept': 'application/json' }
            })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(err.error || '재발급 실패'); });
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.stream_key) {
                        streamKeyInput.value = data.stream_key;
                        // 새 키가 발급되면 사용자 편의를 위해 인풋을 임시로 보여줍니다.
                        streamKeyInput.type = "text";
                        toggleKeyBtn.textContent = "숨기기";

                        alert('✨ 새로운 스트림 키가 발급되었습니다!\nOBS에 새 스트림 키를 복사해서 붙여넣어 주세요.');
                    }
                })
                .catch(error => {
                    console.error('스트림 키 재발급 실패:', error);
                    alert(`🚨 에러 발생: ${error.message}`);
                });
        });

        function updateLiveStatus(isLive) {
            if (isLive) {
                liveBadge.style.display = 'inline-flex';
            } else {
                liveBadge.style.display = 'none';
            }
        }

        // SSE 구독
        const eventSource = new EventSource('/api/rooms/my/stream-status');

        eventSource.onmessage = function(event) {
            try {
                const res = JSON.parse(event.data);
                console.log("📡 실시간 상태 전송옴:", res);

                updateLiveStatus(res.is_live);
            } catch (err) {
                console.error("SSE 데이터 파싱 에러:", err);
            }
        };

        eventSource.onerror = function(err) {
            console.error("SSE 연결 시간 초과 또는 오류 발생 (자동 재연결 대기 중...)");
        };
    });

    function copyToClipboard(id) {
        const inputEl = document.getElementById(id);
        if (!inputEl) return;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(inputEl.value)
                .then(() => {
                    alert('📋 복사가 완료되었습니다!');
                })
                .catch(err => {
                    console.error('클립보드 복사 실패:', err);
                    fallbackCopyToClipboard(inputEl);
                });
        } else {
            fallbackCopyToClipboard(inputEl);
        }
    }

    // 구형 브라우저 & 로컬 환경
    function fallbackCopyToClipboard(inputEl) {
        const originalType = inputEl.type;
        inputEl.type = "text";
        inputEl.select();
        try {
            document.execCommand('copy');
            alert('📋 복사가 완료되었습니다!');
        } catch (err) {
            alert('🚨 복사에 실패했습니다. 브라우저 설정을 확인해주세요.');
        }
        inputEl.type = originalType;
    }
</script>
</body>
</html>
