{{ define "header" }}
<style>
    .logo-area span {
        color: var(--point-color);
    }

    /* 스트리머 프로필 아바타 동그라미 */
    .streamer-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #3b3b44;
        flex-shrink: 0;
        overflow: hidden;
        border: 1px solid var(--border-color);
    }

    .streamer-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* ==========================================================================
   📌 1. 공통 헤더 (Header) 디자인
   ========================================================================== */
    .main-header {
        background-color: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 30px;
        box-sizing: border-box;
        z-index: 100;
    }

    /* 로고 영역 */
    .logo-area {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -1px;
        cursor: pointer;
        text-decoration: none;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 5px;
    }

    /* 헤더 우측 버튼 그룹 */
    .header-buttons {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    /* 기본 공통 버튼 스타일 */
    .nav-btn {
        border: 1px solid var(--border-color);
        padding: 8px 18px;
        font-size: 14px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
    }

    /* 방송하기 버튼 (민트 포인트 강조) */
    .btn-stream {
        background-color: transparent;
        color: var(--point-color);
        border-color: var(--point-color);
    }

    .btn-stream:hover {
        background-color: var(--point-color);
        color: #000;
        box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
    }

    /* 로그인 버튼 */
    .btn-login {
        background-color: #2a2a30;
        color: var(--text-main);
        border: none;
    }

    .btn-login:hover {
        background-color: #3b3b44;
    }

    .github-link {
        display: flex;
        align-items: center;
        color: var(--text-main);
        text-decoration: none;
        transition: opacity 0.2s;
    }

    .github-link:hover {
        opacity: 0.7;
    }

    /* GitHub SVG 아이콘 */
    .github-icon {
        width: 24px;
        height: 24px;
        fill: currentColor;
    }
</style>
<header class="main-header">
    <a href="/" class="logo-area" target="_blank" rel="noopener noreferrer">
        재욱<span>TV</span>
    </a>
    <div class="header-buttons">
        <a href="https://github.com/eari100/my-RTMP" class="github-link" target="_blank" title="GitHub 소스코드">
            <svg class="github-icon" viewBox="0 0 16 16">
                <path d="M8 0C3.58 0 0 3.58 0 08c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
        </a>
        {{if .User.Email}}
        <a id="btnStream" class="nav-btn btn-stream">📹 방송하기</a>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="streamer-avatar" style="width: 32px; height: 32px;">
                <img src="{{.User.Picture}}" alt="프로필">
            </div>
            <span style="font-size: 14px; font-weight: bold; color: var(--text-main);">{{.User.Name}}님</span>
            <a href="/auth/logout" class="nav-btn btn-login" style="background-color: #ff4a4a; font-size: 12px; padding: 6px 12px;">로그아웃</a>
        </div>
        {{else}}

        <a href="/auth/google/login" class="nav-btn btn-login" style="text-decoration: none; text-align: center;">구글 로그인</a>
        {{end}}
    </div>
</header>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const streamBtn = document.getElementById('btnStream');

        // 여러 개 뜨지 않도록 방지하기 위한 전역 변수 선언
        let studioWindow = null;

        if(streamBtn) {
            streamBtn.addEventListener('click', function(e) {
                e.preventDefault();

                // 중복 생성 방지 로직
                // 1. 이미 창이 켜져 있고(null이 아니고) 2. 닫히지 않은 상태라면
                if (studioWindow && !studioWindow.closed) {
                    studioWindow.focus();
                    return;
                }

                // 팝업창 사이즈 및 정중앙 배치 세팅
                const width = 520;
                const height = 650;
                const left = (window.screen.width / 2) - (width / 2);
                const top = (window.screen.height / 2) - (height / 2);

                // 백엔드에서 제공할 스튜디오 전용 고유 URL 호출 (예: /studio)
                studioWindow = window.open(
                    '/studio',
                    'studioPopup',
                    `width=${width},height=${height},left=${left},top=${top},resizable=no,scrollbars=yes,status=no,location=no,toolbar=no`
                );
            });
        }
    });
</script>
{{ end }}
