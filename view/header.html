{{ define "header" }}
<style>
    /* 🎨 글로벌 변수 및 초기화 */
    :root {
        --bg-main: #0a0a0d;       /* 🖤 진한 블랙 배경 */
        --bg-card: #131317;       /* 🗂️ 기존 #18181c 보다 어두운 카드/헤더 배경 */
        --text-main: #94a3b8;     /* 메인 흰색 글씨 */
        --text-sub: #9ca3af;      /* 연한 회색 글씨 */
        --point-color: #a855f7;   /* 시그니처 연보라 */
        --live-color: #ff4a4a;    /* 라이브 빨간색 */
        --border-color: #26262b;  /* 경계선 색상 */
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .logo-area span {
        color: var(--point-color);
    }

    /* 스트리머 프로필 아바타 동그라미 */
    .streamer-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #3b3b44;
        flex-shrink: 0;
        overflow: hidden;
        border: 1px solid var(--border-color);
    }

    .streamer-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* ==========================================================================
   📌 1. 공통 헤더 (Header) 디자인
   ========================================================================== */
    .main-header {
        background-color: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 30px;
        box-sizing: border-box;
        z-index: 100;
    }

    /* 로고 영역 */
    .logo-area {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -1px;
        cursor: pointer;
        text-decoration: none;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 5px;
    }

    /* 헤더 우측 버튼 그룹 */
    .header-buttons {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    /* 기본 공통 버튼 스타일 */
    .nav-btn {
        border: 1px solid var(--border-color);
        padding: 8px 18px;
        font-size: 14px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
    }

    /* 방송하기 버튼 (민트 포인트 강조) */
    .btn-stream {
        background-color: transparent;
        color: var(--point-color);
        border-color: var(--point-color);
    }

    .btn-stream:hover {
        background-color: var(--point-color);
        color: #000;
        box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
    }

    /* 로그인 버튼 */
    .btn-login {
        background-color: #2a2a30;
        color: var(--text-main);
        border: none;
    }

    .btn-login:hover {
        background-color: #3b3b44;
    }

</style>
<header class="main-header">
    <a href="/" class="logo-area">
        재욱<span>TV</span>
    </a>
    <div class="header-buttons">
        <a href="#" class="nav-btn btn-stream">📹 방송하기</a>

        {{if .Email}}

        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="streamer-avatar" style="width: 32px; height: 32px;">
                <img src="{{.Picture}}" alt="프로필">
            </div>
            <span style="font-size: 14px; font-weight: bold; color: var(--text-main);">{{.Name}}님</span>
            <a href="/auth/logout" class="nav-btn btn-login" style="background-color: #ff4a4a; font-size: 12px; padding: 6px 12px;">로그아웃</a>
        </div>
        {{else}}

        <a href="/auth/google/login" class="nav-btn btn-login" style="text-decoration: none; text-align: center;">구글 로그인</a>
        {{end}}
    </div>
</header>
{{ end }}
