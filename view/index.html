    {{ template "global_css" . }}
    <style>
        /* ==========================================================================
           📌 2. 메인 컨텐츠 영역 및 그리드 라이브 리스트
           ========================================================================== */
        .content-wrapper {
            max-width: 1400px;
            margin: 110px auto 50px auto; /* 헤더에 가려지지 않게 상단 여백 보정 */
            padding: 0 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 💡 반응형 네모 칸 썸네일 그리드 레이아웃 */
        .stream-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        /* 방송 카드 컴포넌트 */
        .stream-card {
            background-color: transparent;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease;
        }

        .stream-card:hover {
            transform: translateY(-5px);
        }

        /* 썸네일 박스 (상대 좌표 기준) */
        .thumbnail-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* 16:9 규격 고정 */
            background-color: #232329;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .thumbnail-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 배지: 🔴 LIVE */
        .badge-live {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--live-color);
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        /* 배지: 시청자 수 */
        .badge-viewers {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
        }

        /* 방송 정보 영역 (하단 글씨 배치) */
        .stream-info {
            display: flex;
            margin-top: 12px;
            padding: 0 4px;
            gap: 12px;
        }

        /* 텍스트 디테일 */
        .stream-detail {
            flex-grow: 1;
            overflow: hidden;
        }

        .stream-title {
            font-size: 15px;
            font-weight: bold;
            margin: 0 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 글자가 넘치면 ... 처리 */
            color: var(--text-main);
        }

        .stream-author {
            font-size: 13px;
            color: var(--text-sub);
            margin: 0 0 4px 0;
        }

        .stream-category {
            display: inline-block;
            font-size: 11px;
            background-color: #202026;
            color: var(--point-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }
    </style>
</head>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("live-stream-container");

        fetch("/api/rooms/live?is_live=true")
            .then(res => {
                if (!res.ok) throw new Error("네트워크 응답 실패");
                return res.json();
            })
            .then(rooms => {
                container.innerHTML = "";

                // 라이브 중인 방송이 0개일 때 예외 처리
                if (rooms.length === 0) {
                    container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-sub); padding: 50px 0;">현재 라이브 중인 방송이 없습니다. 😴</p>`;
                    return;
                }

                rooms.forEach(room => {
                    const avatarUrl = room.picture ? room.picture : 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=100';

                    const cardHTML = `
                        <a href="/watch/${room.user_id}" class="stream-card">
                            <div class="thumbnail-box">
                                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600" alt="썸네일">
                                <span class="badge-live">LIVE</span>
                                <span class="badge-viewers">ON AIR</span>
                            </div>
                            <div class="stream-info">
                                <div class="streamer-avatar">
                                    <img src="${avatarUrl}" alt="${escapeHtml(room.user_name)}의 아바타" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                                </div>
                                <div class="stream-detail">
                                    <p class="stream-title">${escapeHtml(room.title)}</p>
                                    <p class="stream-author">${escapeHtml(room.user_name)}</p>
<!--                                    <span class="stream-category">스트리밍</span>-->
                                </div>
                            </div>
                        </a>
                    `;
                    container.insertAdjacentHTML("beforeend", cardHTML);
                });
            })
            .catch(err => {
                console.error("🚨 방송 목록 로드 오류:", err);
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: red; padding: 50px 0;">방송 목록을 불러오지 못했습니다.</p>`;
            });
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(m) {
            switch (m) {
                case '&': return '&amp;';
                case '<': return '&lt;';
                case '>': return '&gt;';
                case '"': return '&quot;';
                case "'": return '&#039;';
                default: return m;
            }
        });
    }
</script>
