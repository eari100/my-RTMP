<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Go 내장 라이브 방송국</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    {{ template "global_css" . }}
    <style>
        /* 커스텀 컨트롤 바 전체 감싸기 */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            gap: 15px;
            z-index: 15;
        }

        /* 시간 표시 글자 스타일 */
        #current-time-display {
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
        }

        /* 타임라인 전체 바 (배경) */
        .progress-bar-container {
            flex-grow: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            position: relative;
        }

        /* 실시간으로 차오르는 게이지 */
        #progress-bar-fill {
            height: 100%;
            width: 0%; /* 자바스크립트로 조절 */
            background: #00ffcc; /* 메인 테마 색상 */
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        /* 라이브 뱃지 */
        .live-badge {
            color: #ff4a4a;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }


        .player-wrapper {
            width: 1280px;
            margin: 0 auto;
        }

        /* 💡 상단 메뉴 바 디자인 */
        .player-menu-bar {
            background-color: #1a1a1a;
            padding: 10px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            gap: 10px;
        }

        /* 메뉴 버튼 스타일 */
        .menu-btn {
            background-color: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* 버튼 마우스 호버 효과 */
        .menu-btn:hover {
            background-color: #00ffcc;
            color: #000;
            border-color: #00ffcc;
        }

        /* 버튼이 활성화(켜짐) 되었을 때의 토글 스타일 */
        .menu-btn.active {
            background-color: #00ffcc;
            color: #000;
            border-color: #00ffcc;
        }

        .video-container {
            position: relative;
            width: 1280px;  /* 방송 해상도 규격에 맞추거나 100% 등으로 조절 */
            height: 720px;
            background-color: #000; /* 영상 로딩 전 검은 화면 */
            margin: 0 auto;
        }

        /* 비디오 화면은 컨테이너에 꽉 차게 */
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .overlay-box {
            position: absolute;
            top: 25px;
            left: 25px;
            background: none !important;
            border: none !important;
            padding: 0;

            color: #00ffcc;  /* 메인 글자 색상 */
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;

            /* 💡 1. 뭉개짐 방지: 폰트를 너무 두껍게 하지 않고 일반 두께로 내립니다 */
            font-weight: 500;
            line-height: 1.6;
            z-index: 10;
            display: none;

            /* ✨ 2. 핵심 수정: 사방을 1px씩 옥죄던 그림자를 지우고,
               우측 하단으로 1px~2px 정도만 자연스러운 그림자가 지도록 변경합니다.
               마지막 줄은 전체적으로 글자 뒤를 은은하게 받쳐주는 투명도 60%의 검은 안개 효과입니다. */
            text-shadow:
                    1px 1px 1px rgba(0, 0, 0, 0.8),
                    2px 2px 2px rgba(0, 0, 0, 0.6);
        }

        /* 상단 타이틀도 동일하게 수정 */
        .overlay-title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
            border-bottom: none !important;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* ✨ 방송용 워터마크 스타일 */
        .stream-watermark {
            position: absolute;
            top: 20px;        /* 우측 상단 배치 */
            right: 20px;
            color: rgba(255, 255, 255, 0.4); /* 은은하게 반투명한 흰색 */
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
            z-index: 10;
            pointer-events: none; /* 워터마크 때문에 우클릭 등 마우스 클릭이 막히지 않게 방어 */
            user-select: none;    /* 드래그 방지 */
        }

        body {
            background-color: #f3f4f6; /* 밝고 부드러운 연회색 배경 */
            color: #1f2937; /* 가독성 높은 다크 그레이 텍스트 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #111827;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.05em;
        }

        /* 비디오와 오버레이를 감싸는 컨테이너 */
        .player-container {
            position: relative;
            width: 854px;
            height: 480px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #ffffff; /* 하얀색 테두리로 비디오 강조 */
            background-color: #ffffff;
        }

        video {
            width: 100%;
            height: 100%;
            background-color: #e5e7eb; /* 비디오가 꺼져있을 때의 배경을 하얀색/연회색으로 지정 */
            object-fit: cover;
        }

        /* 💡 화이트 테마에 어울리는 고급스럽고 미니멀한 오버레이 패널 */
        #metadata-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.92); /* 반투명 하얀색 배경 */
            border: 1px solid #e5e7eb;
            color: #1f2937; /* 어두운 글씨색 */
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            padding: 16px;
            border-radius: 8px;
            pointer-events: none; /* 마우스 클릭이 뒤에 있는 비디오에 전달되도록 함 */
            line-height: 1.6;
            display: none; /* 메타데이터가 오기 전엔 숨김 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(4px); /* 뒤에 비치는 화면을 살짝 흐리게 처리해 고급스러운 효과 제공 */
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #10b981; /* 초록색 상태 표시등 */
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

{{ template "header" . }}

<div class="player-wrapper">
    <div class="player-menu-bar">
        <button id="toggle-stream-info-btn" class="menu-btn">📊 스트림 정보</button>
    </div>

    <div class="video-container">
        <video id="videoElement" autoplay muted controls></video>


        <div class="custom-controls">
            <span id="current-time-display">00:00:00</span>
            <div class="progress-bar-container">
                <div id="progress-bar-fill"></div>
            </div>
            <span class="live-badge">🔴 LIVE</span>
        </div>


        <div id="metadata-overlay" class="overlay-box">
            <div class="overlay-title">📡 STREAM INFO</div>
            <div id="metadata-content"></div>
        </div>

        <div class="stream-watermark">WookSoft LIVE</div>
    </div>
</div>
<script>
    // 1. mpegts 라이브러리가 브라우저에 잘 로드되었는지 확인
    if (typeof mpegts !== 'undefined') {
        var videoElement = document.getElementById('videoElement');

        const pathParts = window.location.pathname.split('/');
        const roomName = pathParts[pathParts.length - 1];
        
        var player = mpegts.createPlayer({
            type: 'flv',
            isLive: true,
            url: `/live/${roomName}`
        });

        player.attachMediaElement(videoElement);
        player.load();

        // 브라우저 정책상 자동 재생을 위해 무음(muted) 상태에서 play()를 호출합니다.
        player.play().catch(function(error) {
            console.log("자동 재생 차단됨 (사용자 상호작용 필요):", error);
        });

        player.on(mpegts.Events.METADATA_ARRIVED, function(data) {
            console.log("메타데이터 도착:", data);

            var overlay = document.getElementById('metadata-overlay');
            var content = document.getElementById('metadata-content');

            // mpegts.js는 data 최상위에 곧바로 정보가 담겨 옵니다.
            if (data) {
                var textStyleHtml = "";

                // 코덱 ID 가독성 처리
                var videoCodec = data.videocodecid === 7 ? "H.264 (AVC)" : (data.videocodecid || "Unknown");
                var audioCodec = data.audiocodecid === 10 ? "AAC" : (data.audiocodecid || "Unknown");

                // FPS 정밀도 처리 (framerate가 없을 경우 대비)
                var fpsText = data.framerate ? parseFloat(data.framerate).toFixed(2) + " fps" : "Unknown";

                // 화면에 뿌릴 텍스트 포맷팅
                textStyleHtml += "ENCODER    : " + (data.encoder || "Unknown") + "<br>";
                textStyleHtml += "RESOLUTION : " + (data.width || 0) + "x" + (data.height || 0) + "<br>";
                textStyleHtml += "FPS        : " + fpsText + "<br>";
                textStyleHtml += "V_CODEC    : " + videoCodec + "<br>";
                textStyleHtml += "A_CODEC    : " + audioCodec + "<br>";
                textStyleHtml += "A_SAMPLE   : " + (data.audiosamplerate || "Unknown") + " Hz<br>";

                // 비트레이트 정보 매핑 (videodatarate 또는 videobitrate 둘 다 대응)
                var vBitrate = data.videodatarate || data.videobitrate;
                if (vBitrate) {
                    textStyleHtml += "V_BITRATE  : " + vBitrate + " kbps<br>";
                }

                content.innerHTML = textStyleHtml;
            }
        });

        // 에러 핸들링도 추가해두면 디버깅할 때 있어보입니다.
        player.on(mpegts.Events.ERROR, function(errType, errDetail) {
            console.error("플레이어 에러:", errType, errDetail);
        });

    } else {
        alert("mpegts.js 라이브러리를 로드할 수 없습니다. 인터넷 연결을 확인해주세요.");
    }

    document.getElementById('toggle-stream-info-btn').addEventListener('click', function() {
        var overlay = document.getElementById('metadata-overlay');
        var btn = this; // 클릭된 버튼 자신

        if (overlay) {
            // 현재 상태 체크 후 토글
            if (overlay.style.display === 'none' || overlay.style.display === '') {
                overlay.style.display = 'block';
                btn.classList.add('active'); // 버튼 불 들어오게 하기
            } else {
                overlay.style.display = 'none';
                btn.classList.remove('active'); // 버튼 불 끄기
            }
        }
    });

    var timeDisplay = document.getElementById('current-time-display');
    var progressBarFill = document.getElementById('progress-bar-fill');

    // 🎯 방법 1: 비디오 엘리먼트의 자체 내부 타임라인 세그먼트 매핑
    // mpegts.js가 실시간 스트림을 디코딩하여 주입하면, videoElement.currentTime은
    // 미디어 파이프라인 내부의 실제 타임스탬프 속도를 반영하기 시작합니다.
    videoElement.addEventListener('timeupdate', function() {
        var currentTime = videoElement.currentTime;

        // 간혹 미디어 타임스탬프가 음수나 이상한 값으로 시작하는 것을 방어
        if (currentTime && currentTime > 0) {
            var totalSeconds = Math.floor(currentTime);

            var hours = Math.floor(totalSeconds / 3600);
            var minutes = Math.floor((totalSeconds % 3600) / 60);
            var seconds = Math.floor(totalSeconds % 60);

            var formattedTime =
                (hours < 10 ? "0" + hours : hours) + ":" +
                (minutes < 10 ? "0" + minutes : minutes) + ":" +
                (seconds < 10 ? "0" + seconds : seconds);

            // 타임라인 텍스트 업데이트
            timeDisplay.innerText = formattedTime;

            // 타임라인 게이지 바 연동 (매 1분마다 회전)
            var progressPercent = (totalSeconds % 60) / 60 * 100;
            progressBarFill.style.width = progressPercent + "%";
        }
    });
</script>
</body>
</html>
