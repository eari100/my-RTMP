# docker-compose up -d --build
# docker ps
# docker-compose logs -f backend
services:
  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data:/var/lib/mysql

  backend:
    build: .
    ports:
      - "8080:8080"
      - "1935:1935"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306